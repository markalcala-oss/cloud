<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads Tracker - Gestión de Contactos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-gray-50 font-sans text-gray-900 flex flex-col min-h-screen">

    <nav class="bg-slate-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold tracking-wider text-blue-400">TechConsulting</span>
                </div>
                <div class="flex space-x-4">
                    <a href="{{ url_for('index') }}" class="hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium">Inicio</a>
                    <a href="{{ url_for('contacts') }}" class="hover:text-blue-400 px-3 py-2 rounded-md text-sm font-medium">Ver Leads</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-900 text-gray-400 py-6 text-center text-sm border-t border-slate-800">
        &copy; 2026 TechConsulting. Todos los derechos reservados.
    </footer>

</body>
</html>
