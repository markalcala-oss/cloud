{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-6 md:p-10 rounded-lg shadow-md max-w-md mx-auto mt-10">
    <h2 class="text-2xl font-semibold mb-6 text-gray-800 text-center">Registrar Contacto</h2>
    
    <form action="/" method="POST" class="space-y-4">
        <div>
            <label class="block text-gray-700 font-medium mb-1">Nombre Completo *</label>
            <input type="text" name="nombre" required 
                   class="w-full border border-gray-300 px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div>
            <label class="block text-gray-700 font-medium mb-1">Correo Electrónico *</label>
            <input type="email" name="email" required 
                   class="w-full border border-gray-300 px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <div>
            <label class="block text-gray-700 font-medium mb-1">Teléfono (Opcional)</label>
            <input type="text" name="telefono" 
                   class="w-full border border-gray-300 px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <button type="submit" 
                class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition duration-200">
            Guardar Contacto
        </button>
    </form>
</div>
{% endblock %}
