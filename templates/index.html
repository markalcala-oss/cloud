{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center pt-4 sm:pt-10">
    <div class="bg-white p-6 sm:p-8 rounded-xl shadow-lg w-full max-w-md md:max-w-2xl transition-all">
        
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">Agregar Contacto</h2>
        <p class="text-gray-500 text-sm text-center mb-6">Guarda la información directamente en el servidor EC2-DB</p>

        {% if error_msg %}
        <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-r-md text-red-700 text-sm flex items-center gap-2 w-full animate-pulse">
            ⚠️ <strong>Error:</strong> {{ error_msg }}
        </div>
        {% endif %}
        
        <form action="/" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="md:col-span-2">
                <label class="block text-gray-700 text-xs font-bold uppercase tracking-wide mb-2">Nombre Completo</label>
                <input type="text" name="nombre" required placeholder="Ej. Juan Pérez" 
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition">
            </div>

            <div>
                <label class="block text-gray-700 text-xs font-bold uppercase tracking-wide mb-2">Correo Electrónico</label>
                <input type="email" name="email" required placeholder="juan@correo.com" 
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition">
            </div>

            <div>
                <label class="block text-gray-700 text-xs font-bold uppercase tracking-wide mb-2">Teléfono (Opcional)</label>
                <input type="text" name="telefono" placeholder="+51 987654321" 
                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-hidden focus:ring-2 focus:ring-blue-500 bg-gray-50 focus:bg-white transition">
            </div>

            <div class="md:col-span-2 mt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md hover:shadow-lg transition cursor-pointer text-center">
                    💾 Guardar en la Nube
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
