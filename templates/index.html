<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Importante para móviles -->
    <title>Sitio Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <h1 class="text-3xl text-center mt-10 font-bold">Bienvenidos al Sitio Web</h1>

    <div class="max-w-md mx-auto mt-6 bg-white p-6 rounded shadow">
        <form id="contact-form" class="space-y-4">
            <input type="text" id="name" placeholder="Nombre" class="w-full p-2 border rounded" required>
            <input type="email" id="email" placeholder="Correo" class="w-full p-2 border rounded" required>
            <textarea id="message" placeholder="Mensaje" class="w-full p-2 border rounded" rows="4" required></textarea>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2 transition">
                Enviar
            </button>
        </form>
    </div>
    <div class="relative w-full max-w-2xl mx-auto mt-10">
    <div id="carousel" class="flex overflow-hidden">
        <img src="https://via.placeholder.com/800x400" class="w-full">
        <img src="https://via.placeholder.com/800x400" class="w-full hidden">
        <img src="https://via.placeholder.com/800x400" class="w-full hidden">
    </div>
    <button id="prev" class="absolute top-1/2 left-0 bg-gray-800 text-white p-2">◄</button>
    <button id="next" class="absolute top-1/2 right-0 bg-gray-800 text-white p-2">►</button>
</div>

</body>
</html>
